<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Acessibilidade</title>
</head>

<body>
    <header>
        <h1>Formulário acessibilidade</h1>

        <nav></nav>
        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" required><br>

            <label for="email">E-mail: </label>
            <input type="email" name="email" id="email" required><br>

            <label for="idade">Idade: </label>
            <input type="text" name="idade" id="idade" required><br>

            <label for="materia">Para qual matéria você esta se candidatando?</label>
            <select name="materia" id="materia"><br>
                <option value="_blank"></option>
                <option value="matematica">Matemática</option>
                <option value="portugues">Português</option>
                <option value="biologia">Biologia</option>
                <option value="ciencias">Ciências</option>
                <option value="historia">Historia</option>
                <option value="geografia">Geografia</option>
                <option value="artes">Artes</option>

            </select>
            <br>
            <label for="disponibilidade">Tem disponibilidade para qual turno?</label><br>
            <input type="checkbox" name="manha" id="manha">
            <label for="manha">Manhã</label><br>
            <input type="checkbox" name="tarde" id="tarde">
            <label for="tarde">Tarde</label><br>
            <input type="checkbox" name="noite" id="noite">
            <label for="noite">Noite</label><br>

            </select><br>

            <label for="escolaridade">Qual seu nível de escolaridade?</label><br>

            <input type="checkbox" name="superiorcompleto" id="superiorcompleto">
            <label for="superiorcompleto">Superior Completo</label><br>
            <input type="checkbox" name="cursandomestrado" id="cursandomestrado">
            <label for="cursandomestrado">Cursando Mestrado</label><br>
            <input type="checkbox" name="mestradocompleto" id="mestradocompleto">
            <label for="mestradocompleto">Mestrado Completo</label><br>
            <input type="checkbox" name="cursandodoutorado" id="cursandodoutorado">
            <label for="cursandodoutorado">Cursando Doutorado</label><br>
            <input type="checkbox" name="doutoradocompleto" id="doutoradocompleto">
            <label for="doutoradocompleto">Doutorado Completo</label><br>

            <label for="descricao">Descrição sobre si</label>

            <textarea name="descricao" id="descricao" maxlength="200" required></textarea><br>
            <input type="submit" value="Enviar mensagem"><br>

        </form>
    </header>
</body>

</html>
